# T4-optimized timeboxed Phase 1: fits comfortably in 14.5 GB.
#
# changes vs advisor_timeboxed.yaml that caused OOM / crashes on T4:
#   - num_generations: 1 (was 2) — halves grpo activation memory
#   - max_completion_length: 160 (was 320) — saves activation memory
#   - max_turns: 6 (was 8) — shorter episodes
#   - dropout 0 + beta 0 — kills kl ref model + enables unsloth fast patching
#   - max_prompt_length: 2048 — must be >= the env's actual prompt length;
#     real episodes hit ~2000 tokens by turn 6, lower caps caused unsloth to
#     truncate silently and grpo_step then sliced past the end.
#
# also: set PYTORCH_ALLOC_CONF=expandable_segments:True in the env before launching
# to reduce memory fragmentation.
phase: timeboxed_t4
model:
  base_model: Qwen/Qwen2.5-0.5B-Instruct
  load_in_4bit: true
  use_unsloth: true
  # uncomment to resume from a prior adapter (we trained in two phases
  # of 100 each via resume; a fresh run with num_episodes=200 below produces
  # the same total trained-episode count from scratch).
  # resume_adapter: training/checkpoints/adapter_final_timeboxed_t4.lora

lora:
  r: 8
  alpha: 16
  dropout: 0.0  # 0 enables unsloth fast-patching path (was 0.05)
  target_modules: [q_proj, k_proj, v_proj, o_proj]

grpo:
  num_generations: 1
  learning_rate: 1.0e-5
  beta: 0.0  # 0 kills the KL reference model entirely; saves ~7gb on T4 (was 0.04)
  # real prompts hit ~2000 tokens by turn 6 (system + kb + 6-turn dialogue history).
  # 768 caused unsloth to silently truncate inside the model and the buffer
  # offsets in grpo_step then pointed past the end. 2048 fits real conversations
  # with breathing room and still fits the t4 (now ~12-13gb peak with 8bit adam +
  # per-turn backward + no vllm).
  max_prompt_length: 2048
  max_completion_length: 160
  temperature: 0.9
  top_p: 0.95
  num_episodes: 176
  episode_batch_size: 1

env:
  max_turns: 6
  difficulty_mix:
    easy: 0.7
    medium: 0.3
    hard: 0.0

logging:
  wandb_project: nyaya-mitra-grpo
  wandb_tags: [phase1, t4, qwen-0.5b, resumed]
  log_every: 1
  transcript_dump_every: 50
  transcript_dump_count: 1
  adapter_snapshot_every: 50
  metrics_jsonl: training/dumps/phase1_t4_metrics.jsonl

abort:
  min_rolling_mean_at_500: 0.0
